name: Update HR Dashboard Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data
        run: python fetch_data.py
        env:
          SHEET_ID: 1W4CY0Za6M3U7NqjwPjuUcyPr7SCQ__koSPrTi4ECs3I

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update HR data $(date -u '+%Y-%m-%d %H:%M')"
          git push
