<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
  h1 { color: #fff; font-size: 24px; margin-bottom: 6px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 16px; }
  .filters { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .filters label { color: #888; font-size: 13px; }
  .filters input[type="date"] { background: #1a1d27; border: 1px solid #2a2d3a; color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 13px; }
  .filters button { background: #3b82f6; color: #fff; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .filters button:hover { background: #2563eb; }
  .filters button.reset { background: #2a2d3a; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .kpi { background: #1a1d27; border-radius: 12px; padding: 20px; border-left: 4px solid #3b82f6; }
  .kpi.red { border-left-color: #ef4444; }
  .kpi.green { border-left-color: #22c55e; }
  .kpi.yellow { border-left-color: #f59e0b; }
  .kpi-label { font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 32px; font-weight: 700; color: #fff; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
  .card { background: #1a1d27; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .card h2 { font-size: 15px; color: #aaa; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { color: #666; font-weight: 500; text-align: left; padding: 8px 12px; border-bottom: 1px solid #2a2d3a; }
  td { padding: 10px 12px; border-bottom: 1px solid #1e2130; }
  tr:hover td { background: #1e2130; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.red { background: #3f1a1a; color: #ef4444; }
  .badge.yellow { background: #3f2e0a; color: #f59e0b; }
  .badge.green { background: #0a3f1a; color: #22c55e; }
  .toggle-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .updated { color: #444; font-size: 12px; text-align: right; margin-top: 24px; }
  @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>📊 HR Dashboard</h1>
<p class="subtitle" id="updated">Загрузка...</p>

<div class="filters">
  <label>С:</label>
  <input type="date" id="dateFrom">
  <label>По:</label>
  <input type="date" id="dateTo">
  <button onclick="applyFilter()">Применить</button>
  <button class="reset" onclick="resetFilter()">Сегодня</button>
</div>

<div class="kpi-grid" id="kpi-grid"></div>

<div class="card">
  <div style="display:flex;gap:40px;align-items:center;flex-wrap:wrap;">
    <div>
      <div style="color:#888;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Заявок всего</div>
      <div style="font-size:36px;font-weight:700;color:#fff;" id="total-jobs-count">—</div>
    </div>
    <div>
      <div style="color:#888;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Открыто сейчас</div>
      <div style="font-size:36px;font-weight:700;color:#22c55e;" id="open-jobs-count">—</div>
    </div>
    <div>
      <div style="color:#888;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Закрыто</div>
      <div style="font-size:36px;font-weight:700;color:#3b82f6;" id="closed-jobs-count">—</div>
    </div>
  </div>
</div>

<div class="card">
  <div class="toggle-header" onclick="toggleVacancies()">
    <h2 style="margin:0">📋 Все вакансии в работе</h2>
    <span id="vac-btn" style="color:#3b82f6;font-size:13px;font-weight:600;">▼ Раскрыть</span>
  </div>
  <div id="vac-block" style="display:none;margin-top:20px;overflow-x:auto;">
    <table id="vacancies-table">
      <tr><th>Вакансия</th><th>Рекрутер</th><th>Отдел</th><th>Активных</th><th>Горячие этапы</th><th>Статус</th></tr>
    </table>
  </div>
</div>

<div class="grid-2">
  <div class="card" style="margin-bottom:0">
    <h2>Рекрутеры</h2>
    <table id="recruiter-table"></table>
  </div>
  <div class="card" style="margin-bottom:0">
    <h2>Воронка найма</h2>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <label style="color:#888;font-size:13px;">Дата:</label>
      <input type="date" id="funnelDate" style="background:#0f1117;border:1px solid #2a2d3a;color:#fff;padding:6px 10px;border-radius:8px;font-size:13px;">
      <button onclick="renderFunnel()" style="background:#3b82f6;color:#fff;border:none;padding:6px 16px;border-radius:8px;cursor:pointer;font-size:13px;">Показать</button>
    </div>
    <canvas id="funnelChart" height="260"></canvas>
  </div>
</div>

<div class="card">
  <h2>🔴 Просроченные вакансии</h2>
  <table id="sla-table"></table>
</div>

<div class="card">
  <h2>📈 Тренд — активные кандидаты</h2>
  <canvas id="trendChart" height="100"></canvas>
</div>

<p class="updated" id="footer"></p>

<script>
const DATA_URL = 'data.json';
let allData = null;
let funnelChart, trendChart;
const HOT_STAGES = ['СБ','Автопроверка СБ','Проверка СБ','Медосмотр','Мед. осмотр','Сбор документов','Сбор документов на СБ','Оформление','Стажировка'];

function getToday() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + d;
}

async function loadData() {
  try {
    document.getElementById('updated').textContent = 'Загрузка данных...';
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    allData = await r.json();
    const today = getToday();
    document.getElementById('dateFrom').value = today;
    document.getElementById('dateTo').value = today;
    document.getElementById('funnelDate').value = today;
    renderDashboard(today, today);
    renderFunnel();
  } catch(e) {
    document.getElementById('updated').textContent = 'Ошибка загрузки: ' + e.message;
  }
}

function applyFilter() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  if (from && to) renderDashboard(from, to);
}

function resetFilter() {
  const today = getToday();
  document.getElementById('dateFrom').value = today;
  document.getElementById('dateTo').value = today;
  renderDashboard(today, today);
}

function inRange(date, from, to) { return date >= from && date <= to; }

function toggleVacancies() {
  const block = document.getElementById('vac-block');
  const btn = document.getElementById('vac-btn');
  if (block.style.display === 'none') {
    block.style.display = 'block';
    btn.textContent = '▲ Скрыть';
  } else {
    block.style.display = 'none';
    btn.textContent = '▼ Раскрыть';
  }
}

function renderDashboard(from, to) {
  if (!allData) return;

  const snapshot = allData.daily_snapshot.filter(r => inRange(r.date, from, to));
  const recruiters = allData.recruiter_stats.filter(r => inRange(r.date, from, to));
  const sla = allData.sla_log.filter(r => inRange(r.date, from, to));
  const vacancies = allData.vacancies.filter(r => inRange(r.date, from, to));
  const funnel = allData.funnel_stages.filter(r => inRange(r.date, from, to));

  // Если данных за выбранный период нет — берём последнюю доступную дату
  const effectiveSnapshot = snapshot.length ? snapshot : allData.daily_snapshot.slice(-1);
  const effectiveRecruiters = recruiters.length ? recruiters : allData.recruiter_stats.slice(-10);
  const effectiveSla = sla.length ? sla : allData.sla_log.slice(-10);
  const effectiveVacancies = vacancies.length ? vacancies : allData.vacancies.slice(-50);
  const effectiveFunnel = funnel.length ? funnel : allData.funnel_stages.slice(-100);

  // KPI
  const avgF = (arr, key) => arr.length ? Math.round(arr.reduce((s,r) => s+(parseFloat(r[key])||0),0)/arr.length) : 0;
  document.getElementById('kpi-grid').innerHTML = [
    { label: 'Открытых вакансий',   value: avgF(effectiveSnapshot,'total_open_jobs'),         cls: 'blue' },
    { label: 'Активных кандидатов', value: avgF(effectiveSnapshot,'total_active_candidates'), cls: 'green' },
    { label: 'Просрочено',          value: avgF(effectiveSnapshot,'overdue_count'),           cls: avgF(effectiveSnapshot,'overdue_count')>3?'red':'yellow' },
    { label: 'Без рекрутера',       value: avgF(effectiveSnapshot,'no_recruiter_count'),      cls: avgF(effectiveSnapshot,'no_recruiter_count')>0?'red':'green' },
    { label: 'Без кандидатов',      value: avgF(effectiveSnapshot,'no_candidates_count'),     cls: 'yellow' },
    { label: 'Высокий приоритет',   value: avgF(effectiveSnapshot,'high_priority_count'),     cls: 'yellow' }
  ].map(k=>`<div class="kpi ${k.cls}"><div class="kpi-label">${k.label}</div><div class="kpi-value">${k.value}</div></div>`).join('');

  // Счётчик вакансий
  const vacMap = {};
  effectiveVacancies.forEach(r => { vacMap[r.job_id] = r; });
  const vacs = Object.values(vacMap);
  const openVacs = vacs.filter(v => v.state === 'opened' || v.state === 'open');
  document.getElementById('total-jobs-count').textContent = vacs.length;
  document.getElementById('open-jobs-count').textContent = openVacs.length;
  document.getElementById('closed-jobs-count').textContent = vacs.length - openVacs.length;

  // Горячие этапы
  const funnelMap = {};
  effectiveFunnel.forEach(r => {
    if (!funnelMap[r.job_id]) funnelMap[r.job_id] = [];
    if (HOT_STAGES.some(s => r.stage_name && r.stage_name.toLowerCase().includes(s.toLowerCase())) && parseInt(r.active_applicants)>0) {
      if (!funnelMap[r.job_id].find(s => s.name === r.stage_name)) {
        funnelMap[r.job_id].push({ name: r.stage_name, count: parseInt(r.active_applicants) });
      }
    }
  });

  // Таблица вакансий
  const vacRows = openVacs.sort((a,b)=>(parseInt(b.active_candidates)||0)-(parseInt(a.active_candidates)||0)).map(v => {
    const hot = (funnelMap[v.job_id]||[]).map(s=>`<span style="background:#0a3f1a;color:#22c55e;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-right:4px;">✅ ${s.name}: ${s.count}</span>`).join('') || '<span style="color:#444;font-size:12px;">—</span>';
    const status = v.is_overdue==='TRUE'
      ? '<span style="background:#3f1a1a;color:#ef4444;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;">ПРОСРОЧЕНА</span>'
      : '<span style="background:#0a3f1a;color:#22c55e;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;">В РАБОТЕ</span>';
    return `<tr><td>${v.title||v.job_title||'—'}</td><td>${v.recruiter||'—'}</td><td>${v.department||'—'}</td><td style="font-weight:700;color:#3b82f6;">${v.active_candidates||0}</td><td>${hot}</td><td>${status}</td></tr>`;
  }).join('');
  document.getElementById('vacancies-table').innerHTML =
    `<tr><th>Вакансия</th><th>Рекрутер</th><th>Отдел</th><th>Активных</th><th>Горячие этапы</th><th>Статус</th></tr>${vacRows}`;

  // Рекрутеры
  const recMap = {};
  effectiveRecruiters.forEach(r => {
    const n = r.recruiter_name;
    if (!n) return;
    if (!recMap[n]) recMap[n] = { jobs:[], cands:[], overdue:[] };
    recMap[n].jobs.push(parseInt(r.open_jobs)||0);
    recMap[n].cands.push(parseInt(r.total_active_candidates)||0);
    recMap[n].overdue.push(parseInt(r.overdue_jobs)||0);
  });
  const avgArr = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;
  document.getElementById('recruiter-table').innerHTML =
    `<tr><th>Рекрутер</th><th>Вакансий</th><th>Кандидатов</th><th>Просрочено</th></tr>` +
    Object.entries(recMap).map(([n,d])=>`<tr><td>${n}</td><td>${avgArr(d.jobs)}</td><td>${avgArr(d.cands)}</td><td><span class="badge ${avgArr(d.overdue)>0?'red':'green'}">${avgArr(d.overdue)}</span></td></tr>`).join('');

  // SLA
  const slaUniq = [...new Map(effectiveSla.map(r=>[r.job_id,r])).values()].slice(0,10);
  document.getElementById('sla-table').innerHTML =
    `<tr><th>Вакансия</th><th>Рекрутер</th><th>Дней открыта</th><th>Дедлайн</th><th>Риск</th></tr>` +
    (slaUniq.length ? slaUniq.map(r=>`<tr><td>${r.job_title}</td><td>${r.recruiter}</td><td>${r.days_open}</td><td>${r.closure_date}</td><td><span class="badge ${r.risk_level==='HIGH'?'red':'yellow'}">${r.risk_level}</span></td></tr>`).join('') : '<tr><td colspan="5" style="color:#666;text-align:center">Просроченных нет 🎉</td></tr>');

  // Тренд
  const dates = [...new Set(allData.daily_snapshot.map(r=>r.date))].sort();
  const vals = dates.map(d => { const rows=allData.daily_snapshot.filter(r=>r.date===d); return rows.length?parseInt(rows[rows.length-1].total_active_candidates)||0:0; });
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: { labels: dates, datasets: [{ label: 'Активные кандидаты', data: vals, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.1)', fill: true, tension: 0.4 }] },
    options: { plugins: { legend: { labels: { color: '#aaa' } } }, scales: { x: { ticks: { color: '#666' }, grid: { color: '#1e2130' } }, y: { ticks: { color: '#666' }, grid: { color: '#1e2130' } } } }
  });

  const range = from===to ? from : `${from} — ${to}`;
  document.getElementById('updated').textContent = `Период: ${range} | Обновлено: ${allData.updated_at}`;
  document.getElementById('footer').textContent = `Открыто: ${new Date().toLocaleString('ru-RU')}`;
}

function renderFunnel() {
  if (!allData) return;
  const date = document.getElementById('funnelDate').value;
  if (!date) return;
  const dayFunnel = allData.funnel_stages.filter(r => r.date === date);
  const useFunnel = dayFunnel.length ? dayFunnel : allData.funnel_stages.slice(-50);
  const stageMap = {};
  useFunnel.forEach(r => {
    if (!stageMap[r.stage_name]) stageMap[r.stage_name] = 0;
    stageMap[r.stage_name] += parseInt(r.active_applicants)||0;
  });
  const sorted = Object.entries(stageMap).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if (funnelChart) funnelChart.destroy();
  funnelChart = new Chart(document.getElementById('funnelChart'), {
    type: 'bar',
    data: {
      labels: sorted.map(s=>s[0]),
      datasets: [{ data: sorted.map(s=>s[1]), backgroundColor: '#3b82f6', borderRadius: 6 }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#666' }, grid: { color: '#1e2130' } },
        y: { ticks: { color: '#aaa', font: { size: 11 } }, grid: { color: '#1e2130' } }
      },
      animation: {
        onComplete: function() {
          const ctx = this.ctx;
          ctx.font = 'bold 12px Segoe UI';
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'left';
          this.data.datasets.forEach((dataset, i) => {
            this.getDatasetMeta(i).data.forEach((bar, index) => {
              const val = dataset.data[index];
              if (val > 0) ctx.fillText(val, bar.x + 6, bar.y + 4);
            });
          });
        }
      }
    }
  });
}

loadData();
setInterval(loadData, 60 * 60 * 1000);
</script>
</body>
</html>
